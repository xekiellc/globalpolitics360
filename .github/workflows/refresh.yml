name: Refresh Articles

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch articles and generate teasers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-articles.js

      - name: Commit and push updated articles.json
        run: |
          git config user.name "GP360 Bot"
          git config user.email "bot@globalpolitics360.com"
          git add articles.json podcasts.json tech.json archive.json videos.json
          git diff --staged --quiet || git commit -m "chore: auto-refresh articles $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
